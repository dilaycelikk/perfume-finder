<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sillage — Perfume Finder</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Poppins:wght@300;400;500&display=swap');
        
        body { 
            background-color: #0A0A0A; color: #A1A1A1; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
        }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 60px; border-bottom: 1px solid rgba(200, 169, 107, 0.1); }
        .logo { font-family: 'Cormorant Garamond', serif; color: #F5F5F2; font-size: 26px; text-decoration: none; letter-spacing: 2px; }
        .logo em { color: #C8A96B; font-style: italic; }
        .nav-links a { color: #A1A1A1; text-decoration: none; margin-left: 40px; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; font-weight: 400; transition: color 0.3s ease; }
        .nav-links a:hover { color: #C8A96B; }

        .page-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .box { background-color: #121212; padding: 60px 50px; width: 100%; max-width: 700px; border: 1px solid rgba(200, 169, 107, 0.1); box-shadow: 0 15px 40px rgba(0,0,0,0.5); }

        h1.title { font-family: 'Cormorant Garamond', serif; color: #F5F5F2; font-size: 42px; font-weight: 400; margin: 0 0 20px 0; letter-spacing: 1px; text-align: center; }
        h1.title em { font-style: italic; color: #C8A96B; }
        .eyebrow { color: #C8A96B; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; font-weight: 500; margin-bottom: 20px; display: block; text-align: center; }
        
        .row { display: flex; align-items: center; margin-bottom: 40px; }
        .label { color: #C8A96B; font-weight: 500; font-size: 12px; text-transform: uppercase; width: 30%; letter-spacing: 2px; }

        .btn-gold { background: #C8A96B; color: #0A0A0A; border: none; padding: 16px 40px; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: inline-block; text-align: center; }
        .btn-gold:hover { background: #E5C07B; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #F5F5F2; }
        .btn-outline:hover { border-color: #C8A96B; color: #C8A96B; background: transparent; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav>
        <a href="{{ url_for('index') }}" class="logo">Perfume <em>Finder</em></a>
        <div class="nav-links">
            {% if session.get('username') %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('favorites') }}">Collection</a>
                <a href="{{ url_for('quiz') }}">Discover</a>
                <a href="{{ url_for('logout') }}" style="color: #666;">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Sign In</a>
                <a href="{{ url_for('register') }}">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="page-content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
