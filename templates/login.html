{% extends 'base.html' %}

{% block content %}
<div class="box" style="max-width: 450px;">
    <span class="eyebrow">Authentication</span>
    <h1 class="title">Sign <em>In</em></h1>

    <form method="POST" action="{{ url_for('login') }}">
        
        <div class="auth-group">
            <label>Email Address</label>
            <input type="email" name="email" required autocomplete="email">
        </div>
        
        <div class="auth-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn-gold" style="width: 100%; margin-top: 20px;">Identity Verify</button>
    </form>
    
    <p style="text-align: center; font-size: 12px; margin-top: 30px; font-weight: 300;">
        New to Sillage? <a href="{{ url_for('register') }}" style="color: #C8A96B; text-decoration: none;">Create an account</a>
    </p>
</div>

<style>
    .auth-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 8px; }
    .auth-group label { color: #C8A96B; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; }
    .auth-group input {
        background: #0A0A0A; border: 1px solid #222; padding: 14px; 
        color: #F5F5F2; font-family: 'Poppins', sans-serif; font-size: 14px;
        transition: all 0.3s ease; font-weight: 300;
    }
    .auth-group input:focus { outline: none; border-color: #C8A96B; box-shadow: 0 0 8px rgba(200, 169, 107, 0.2); }
</style>
{% endblock %}
